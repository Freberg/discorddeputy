on:
  push:
    tags:
      - "v*"

name: release

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true